_format_version: "3.0"
_transform: true

services:
  - name: auth
    url: http://auth:9999/
    routes:
      - name: auth-v1
        paths: [/auth/v1/]
        strip_path: true
    plugins:
      - name: cors

  - name: rest
    url: http://rest:3000/
    routes:
      - name: rest-v1
        paths: [/rest/v1/]
        strip_path: true
    plugins:
      - name: cors

  - name: storage
    url: http://storage:5000/
    routes:
      - name: storage-v1
        paths: [/storage/v1/]
        strip_path: true
    plugins:
      - name: cors

