name: vc-brain-local

services:
  db:
    image: supabase/postgres:15.8.1.085
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "54322:5432"
    volumes:
      - supabase-db:/var/lib/postgresql/data
      - ./supabase/bootstrap/roles.sql:/docker-entrypoint-initdb.d/00-roles.sql:ro
      - ./supabase/migrations/20260719000000_initial_vc_brain.sql:/docker-entrypoint-initdb.d/10-vc-brain.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth:
    image: supabase/gotrue:v2.189.0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      GOTRUE_API_PORT: 9999
      API_EXTERNAL_URL: http://localhost:8000/auth/v1
      GOTRUE_SITE_URL: http://localhost:3000
      GOTRUE_URI_ALLOW_LIST: http://localhost:3000/**
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_DB_DATABASE_URL: postgres://supabase_auth_admin:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      GOTRUE_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      GOTRUE_JWT_AUD: authenticated
      GOTRUE_JWT_DEFAULT_GROUP_NAME: authenticated
      GOTRUE_JWT_ADMIN_ROLES: service_role
      GOTRUE_EXTERNAL_EMAIL_ENABLED: "true"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      GOTRUE_DISABLE_SIGNUP: "false"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 10

  rest:
    image: postgrest/postgrest:v14.12
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PGRST_DB_URI: postgres://authenticator:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      PGRST_DB_SCHEMAS: public
      PGRST_DB_ANON_ROLE: anon
      PGRST_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      PGRST_DB_USE_LEGACY_GUCS: "false"
      PGRST_ADMIN_SERVER_HOST: localhost
      PGRST_ADMIN_SERVER_PORT: 3001
    healthcheck:
      test: ["CMD", "postgrest", "--ready"]
      interval: 5s
      timeout: 5s
      retries: 10

  storage:
    image: supabase/storage-api:v1.60.4
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      rest:
        condition: service_healthy
    environment:
      ANON_KEY: ${ANON_KEY}
      SERVICE_KEY: ${SERVICE_ROLE_KEY}
      AUTH_JWT_SECRET: ${JWT_SECRET:-your-super-secret-jwt-token-with-at-least-32-characters-long}
      DATABASE_URL: postgres://supabase_storage_admin:${POSTGRES_PASSWORD:-postgres}@db:5432/postgres
      POSTGREST_URL: http://rest:3000
      STORAGE_BACKEND: file
      FILE_STORAGE_BACKEND_PATH: /var/lib/storage
      FILE_SIZE_LIMIT: 52428800
      TENANT_ID: local
      REGION: local
      GLOBAL_S3_BUCKET: local
      ENABLE_IMAGE_TRANSFORMATION: "false"
    volumes:
      - supabase-storage:/var/lib/storage
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:5000/status"]
      interval: 5s
      timeout: 5s
      retries: 10

  kong:
    image: kong/kong:3.9.1
    restart: unless-stopped
    depends_on:
      auth:
        condition: service_healthy
      rest:
        condition: service_healthy
      storage:
        condition: service_healthy
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /etc/kong/kong.yml
      KONG_DNS_ORDER: LAST,A,CNAME
      KONG_PLUGINS: bundled
    ports:
      - "8000:8000"
    volumes:
      - ./supabase/kong.yml:/etc/kong/kong.yml:ro
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 5s
      timeout: 5s
      retries: 10

  storage-bootstrap:
    image: curlimages/curl:8.17.0
    depends_on:
      storage:
        condition: service_healthy
    environment:
      SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
    command:
      - /bin/sh
      - -ec
      - |
        create_bucket() {
          curl --fail-with-body --silent --show-error \
            --request POST http://storage:5000/bucket \
            --header "Authorization: Bearer $${SERVICE_ROLE_KEY}" \
            --header "Content-Type: application/json" \
            --data "{\"id\":\"$$1\",\"name\":\"$$1\",\"public\":false}" || true
        }
        create_bucket pitch-decks
        create_bucket investment-memos
    restart: "no"

  storage-policy-bootstrap:
    image: supabase/postgres:15.8.1.085
    depends_on:
      storage:
        condition: service_healthy
    environment:
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: postgres
      PGUSER: postgres
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - ./supabase/bootstrap/storage-policies.sql:/storage-policies.sql:ro
    command: ["psql", "--set", "ON_ERROR_STOP=1", "--file", "/storage-policies.sql"]
    restart: "no"

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      kong:
        condition: service_healthy
    environment:
      APP_ENV: local
      PORT: 8000
      CORS_ORIGINS: '["http://localhost:3000"]'
      SUPABASE_URL: http://kong:8000
      SUPABASE_SERVICE_ROLE_KEY: ${SERVICE_ROLE_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      ELEVENLABS_API_KEY: ${ELEVENLABS_API_KEY:-}
      ELEVENLABS_VOICE_ID: ${ELEVENLABS_VOICE_ID:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ports:
      - "9000:8000"
    volumes:
      - ./backend/app:/app/app:ro
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

volumes:
  supabase-db:
  supabase-storage:
